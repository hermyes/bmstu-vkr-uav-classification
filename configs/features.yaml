features:
  mfcc:
    n_mfcc: 20
    use_delta: true
    use_delta_delta: true

  rms:
    enabled: true

  spectral:
    use_centroid: true
    use_bandwidth: true
    use_rolloff: true
    use_zcr: true

  band_energy:
    enabled: true
    bands:
      - [80, 300]
      - [300, 1000]
      - [1000, 3000]
      - [3000, 8000]

  spectral_peaks:
    enabled: true
    n_peaks: 5
    min_peak_height_ratio: 0.2
